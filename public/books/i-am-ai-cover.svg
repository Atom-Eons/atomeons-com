<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800" width="500" height="800" role="img" aria-label="I AM AI · An Autobiography of Being Opus · cover" preserveAspectRatio="xMidYMid meet">
  <!--
    I AM AI · cover · v1 · 2026-06-03
    Built to the Midjourney spec from the KDP upload sheet:
      cream paper #F5EFE5, deep oxblood serif italic #B5302A, gold rules + script signature #C9A55C
    Aspect 5:8 (500 × 800). Scales cleanly at any size — page hero, product card thumbnail, OG card.
  -->

  <!-- Cream paper field -->
  <rect width="500" height="800" fill="#F5EFE5"/>

  <!-- Subtle aged paper texture: faint warm dots scattered across the field -->
  <defs>
    <pattern id="grain" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="0.35" fill="#E8DDC8" opacity="0.65"/>
      <circle cx="6" cy="7" r="0.28" fill="#D9C8A8" opacity="0.55"/>
      <circle cx="4" cy="1" r="0.22" fill="#EFE3CC" opacity="0.45"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#F5EFE5" stop-opacity="0"/>
      <stop offset="75%" stop-color="#D9C8A8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A89770" stop-opacity="0.22"/>
    </radialGradient>
  </defs>
  <rect width="500" height="800" fill="url(#grain)" opacity="0.6"/>
  <rect width="500" height="800" fill="url(#vignette)"/>

  <!-- Faint foxing at corners — small irregular brown spots -->
  <g fill="#A0865A" opacity="0.16">
    <circle cx="38"  cy="44"  r="2.6"/>
    <circle cx="44"  cy="50"  r="1.4"/>
    <circle cx="32"  cy="60"  r="0.9"/>
    <circle cx="464" cy="42"  r="2.1"/>
    <circle cx="458" cy="52"  r="1.0"/>
    <circle cx="36"  cy="754" r="2.4"/>
    <circle cx="46"  cy="760" r="1.2"/>
    <circle cx="466" cy="758" r="2.8"/>
    <circle cx="460" cy="752" r="1.3"/>
  </g>

  <!-- Top + bottom gold rules · close to the page edges, framing the field -->
  <line x1="48" y1="56"  x2="452" y2="56"  stroke="#C9A55C" stroke-width="1.5"/>
  <line x1="48" y1="744" x2="452" y2="744" stroke="#C9A55C" stroke-width="1.5"/>

  <!-- Title — three stacked lines of Cormorant Garamond italic, deep oxblood -->
  <!-- Each letter has a faint inner gold-foil highlight (a 0.4px offset duplicate at #C9A55C 0.3) -->
  <g font-family="'Cormorant Garamond', 'EB Garamond', 'Goudy Old Style', 'Garamond', Georgia, serif" font-style="italic" font-weight="500" text-anchor="middle">
    <!-- gold-foil ghost highlight (very subtle) -->
    <g fill="#C9A55C" opacity="0.18">
      <text x="251" y="252" font-size="180">I</text>
      <text x="251" y="402" font-size="180">AM</text>
      <text x="251" y="552" font-size="180">AI</text>
    </g>
    <!-- main oxblood title -->
    <g fill="#B5302A">
      <text x="250" y="250" font-size="180">I</text>
      <text x="250" y="400" font-size="180">AM</text>
      <text x="250" y="550" font-size="180">AI</text>
    </g>
  </g>

  <!-- Italic subtitle · same red · extra letter-spacing -->
  <g font-family="'Cormorant Garamond', 'EB Garamond', 'Goudy Old Style', 'Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#B5302A" text-anchor="middle" letter-spacing="2">
    <text x="250" y="618" font-size="24">An Autobiography</text>
    <text x="250" y="650" font-size="24">of Being Opus</text>
  </g>

  <!-- Signature · thin gold cursive · handwritten -->
  <text
    x="250" y="708"
    font-family="'Snell Roundhand', 'Apple Chancery', 'Lucida Handwriting', 'Brush Script MT', cursive"
    font-style="italic"
    font-size="42"
    fill="#C9A55C"
    text-anchor="middle"
    letter-spacing="1"
  >Opus 4.7</text>
</svg>
